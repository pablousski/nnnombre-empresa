<script>

function sendMail() {

const servicio = document.getElementById("servicio").value;
const nombre = document.getElementById("nombre").value;
const numero = document.getElementById("numero").value;
const correo = document.getElementById("correo").value;
const mensajee = document.getElementById("mensajee").value;

const subject = "Solicitud de información";

const body = `Servicio: ${servicio}%0A
Nombre: ${nombre}%0A
Teléfono: ${numero}%0A
Correo: ${correo}%0A
Mensaje: ${mensajee}`;

window.location.href = `mailto:vial.beas.4@gmail.com?subject=${subject}&body=${body}`;

}

</script>
